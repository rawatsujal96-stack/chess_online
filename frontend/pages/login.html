<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Chess Online</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Floating chess pieces background -->
  <div class="chess-pieces-bg" aria-hidden="true">
    <span class="float-piece">♛</span>
    <span class="float-piece">♞</span>
    <span class="float-piece">♝</span>
    <span class="float-piece">♚</span>
    <span class="float-piece">♜</span>
    <span class="float-piece">♟</span>
    <span class="float-piece">♕</span>
    <span class="float-piece">♘</span>
    <span class="float-piece">♗</span>
    <span class="float-piece">♔</span>
  </div>

  <header class="site-header auth-page-header">
    <a href="../index.html" class="logo">♟ Chess Online</a>
    <nav class="site-nav">
      <a href="../index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <span class="auth-card-icon">♔</span>
      <h1>Sign In</h1>
      <p class="sub">Welcome back. Ready to play?</p>

      <div id="loginError" class="form-error" style="margin-bottom:12px; display:none;"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>

      <div class="divider">or</div>

      <button class="btn btn-outline" onclick="doGuestLogin()">Continue as Guest</button>

      <div class="auth-bottom">
        No account? <a href="register.html">Register here</a>
      </div>
    </div>
  </main>

  <footer class="site-footer auth-page-footer">
    <p>© 2024 Chess Online</p>
  </footer>

  <div id="toast"></div>
  <script src="../js/auth.js"></script>
</body>
</html>
