<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Chess Online</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Floating chess pieces background -->
  <div class="chess-pieces-bg" aria-hidden="true">
    <span class="float-piece">♚</span>
    <span class="float-piece">♜</span>
    <span class="float-piece">♝</span>
    <span class="float-piece">♛</span>
    <span class="float-piece">♞</span>
    <span class="float-piece">♟</span>
    <span class="float-piece">♔</span>
    <span class="float-piece">♖</span>
    <span class="float-piece">♗</span>
    <span class="float-piece">♕</span>
  </div>

  <header class="site-header auth-page-header">
    <a href="../index.html" class="logo">♟ Chess Online</a>
    <nav class="site-nav">
      <a href="../index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <span class="auth-card-icon">♚</span>
      <h1>Create Account</h1>
      <p class="sub">Join Chess Online and start playing.</p>

      <div id="regError" style="margin-bottom:12px; display:none;"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Choose a username" autocomplete="username" />
        <span class="form-error" id="usernameErr"></span>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
        <span class="form-error" id="emailErr"></span>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Minimum 6 characters" autocomplete="new-password" />
        <span class="form-error" id="passwordErr"></span>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" />
        <span class="form-error" id="confirmErr"></span>
      </div>

      <button class="btn btn-primary" onclick="doRegister()">Create Account</button>

      <div class="divider">or</div>

      <button class="btn btn-outline" onclick="doGuestLogin()">Continue as Guest</button>

      <div class="auth-bottom">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <footer class="site-footer auth-page-footer">
    <p>© 2024 Chess Online</p>
  </footer>

  <div id="toast"></div>
  <script src="../js/auth.js"></script>
</body>
</html>
